<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>KING OF HYENA</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--control-pad:176px;}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Bebas Neue',sans-serif;overflow:hidden;user-select:none;touch-action:none;overscroll-behavior:none;padding:8px 8px calc(var(--control-pad) + env(safe-area-inset-bottom,0px)) 8px;}
#appWrap{position:relative;display:flex;align-items:center;justify-content:center;width:100%;}
#screen{position:relative;width:min(800px,calc(100vw - 16px),calc((100vh - var(--control-pad) - 16px)*5/3));aspect-ratio:5/3;height:auto;overflow:hidden;border:1px solid #ff440033;box-shadow:0 0 80px #ff220022,0 0 0 1px #ffffff08;}
canvas{display:block;width:100%;height:100%;}
#lobby{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:#000;}
.lb-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 65%,#1a0520,transparent),radial-gradient(ellipse 100% 50% at 50% 100%,#200510,transparent),#000;}
.lb-grid{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 39px,#ff440009 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,#ff440009 40px);}
.lb-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;}
.lb-eye{font-size:11px;letter-spacing:8px;color:#ff440088;margin-bottom:10px;font-family:'Noto Sans KR',sans-serif;font-weight:700;}
.lb-title{font-size:90px;letter-spacing:1px;line-height:0.82;text-align:center;}
.lb-title .a{-webkit-text-stroke:1px #ff4400;color:transparent;}
.lb-title .b{color:#fff;text-shadow:0 0 50px #ff440066;}
.lb-line{width:180px;height:1px;background:linear-gradient(to right,transparent,#ff4400,transparent);margin:14px 0;}
.lb-chars{display:flex;gap:16px;margin-bottom:28px;}
.lb-char{padding:5px 18px;border:1px solid #ff440033;font-size:12px;letter-spacing:3px;color:#ff6633;font-family:'Noto Sans KR',sans-serif;font-weight:700;}
.lb-char.vs{color:#ffffff44;border-color:#ffffff11;}
.mbtn{position:relative;padding:0 52px;height:52px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:5px;color:#fff;background:transparent;border:1px solid #ff4400;cursor:pointer;overflow:hidden;transition:all .2s;}
.mbtn::before{content:'';position:absolute;inset:0;background:#ff4400;transform:translateX(-101%);transition:transform .25s ease;}
.mbtn span{position:relative;z-index:1;}
.mbtn:hover::before{transform:translateX(0);}
.mbtn:active{transform:scale(.97);}
.mbtn:disabled{opacity:.4;cursor:default;}
.mbtn:disabled::before{display:none;}
#statusMsg{margin-top:18px;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:#555;letter-spacing:2px;height:18px;}
.pulse{animation:p1 1.2s infinite;}
@keyframes p1{0%,100%{opacity:1}50%{opacity:.3}}
.keyguide{position:absolute;bottom:18px;display:flex;gap:20px;font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#2a2a2a;}
.keyguide kbd{display:inline-block;padding:2px 6px;border:1px solid #2a2a2a;border-radius:2px;font-size:10px;color:#444;margin-right:3px;}
#hud{position:absolute;top:0;left:0;right:0;height:58px;display:flex;align-items:center;padding:10px 14px;gap:8px;background:linear-gradient(to bottom,rgba(0,0,0,.97),rgba(0,0,0,.5));border-bottom:1px solid #ff440018;z-index:5;pointer-events:none;}
.hcol{flex:1;display:flex;flex-direction:column;gap:4px;}
.hcol.r{align-items:flex-end;}
.hlabel{display:flex;align-items:center;gap:8px;}
.hcol.r .hlabel{flex-direction:row-reverse;}
.hname{font-size:13px;letter-spacing:3px;color:#ddd;}
.hnum{font-size:11px;color:#ff6633;font-family:'Noto Sans KR',sans-serif;font-weight:700;min-width:26px;}
.hcol.r .hnum{text-align:right;}
.htrack{width:100%;height:7px;background:#0f0f0f;border:1px solid #ff440018;overflow:hidden;}
.hbar{height:100%;background:linear-gradient(to right,#cc1100,#ff6600,#ffcc00);transition:width .08s linear;position:relative;}
.hbar::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.2);}
.hcol.r .htrack{direction:rtl;}
.hdanger .hbar{background:linear-gradient(to right,#770000,#bb0000)!important;animation:hd .4s infinite alternate;}
@keyframes hd{from{opacity:1}to{opacity:.55}}
.tcol{width:58px;flex-shrink:0;text-align:center;}
.tlbl{font-size:9px;color:#333;letter-spacing:3px;display:block;margin-bottom:1px;}
.tnum{font-size:36px;color:#fff;line-height:1;}
.turgent{color:#ff1100;animation:tu .5s infinite alternate;}
@keyframes tu{from{transform:scale(1)}to{transform:scale(1.08)}}
#countdown{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:15;pointer-events:none;}
.cdn{font-size:160px;color:#fff;text-shadow:0 0 30px #ff4400,0 0 80px #ff220055;animation:cdp .85s ease-out forwards;}
.cdf{font-size:76px;letter-spacing:10px;color:#ffcc00;text-shadow:0 0 20px #ff8800;animation:cdp .9s ease-out forwards;}
@keyframes cdp{0%{transform:scale(2.2);opacity:0}20%{transform:scale(1);opacity:1}80%{transform:scale(1);opacity:1}100%{transform:scale(.4);opacity:0}}
#overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:rgba(0,0,0,.83);}
.ovr{font-size:74px;letter-spacing:5px;animation:ovp .5s cubic-bezier(.175,.885,.32,1.275) forwards;}
.win{color:#ffdd00;text-shadow:0 0 30px #ffaa00,0 0 60px #ff880033;}
.lose{color:#ff1100;text-shadow:0 0 30px #ff0000,0 0 60px #88000033;}
.draw{color:#888;text-shadow:0 0 20px #666;}
@keyframes ovp{0%{transform:scale(.2) rotate(-8deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.ovs{font-family:'Noto Sans KR',sans-serif;font-size:14px;color:#666;margin-top:8px;letter-spacing:2px;opacity:0;animation:ovf .4s .3s forwards;}
.ovline{width:200px;height:1px;background:linear-gradient(to right,transparent,#ff440055,transparent);margin:18px 0;opacity:0;animation:ovf .4s .5s forwards;}
@keyframes ovf{to{opacity:1}}
.rbtn{padding:0 44px;height:48px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:5px;color:#fff;background:transparent;border:1px solid #ff4400;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;opacity:0;animation:ovf .4s .8s forwards;}
.rbtn::before{content:'';position:absolute;inset:0;background:#ff4400;transform:translateX(-101%);transition:transform .2s;}
.rbtn span{position:relative;z-index:1;}
.rbtn:hover::before{transform:translateX(0);}
.rbtn:active{transform:scale(.97);}
.scanline{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 3px);z-index:99;}
.vignette{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.65) 100%);z-index:98;}
#mobileControls{position:fixed;left:0;right:0;bottom:0;z-index:130;display:flex;justify-content:space-between;align-items:flex-end;gap:12px;padding:10px 12px calc(12px + env(safe-area-inset-bottom,0px));pointer-events:none;}
.ctrlCluster{display:flex;align-items:flex-end;gap:10px;pointer-events:auto;}
.dpad{display:grid;grid-template-columns:68px 68px;grid-template-rows:58px 68px;gap:10px;align-items:end;}
.dpad .up{grid-column:1 / span 2;justify-self:center;width:72px;}
.actButtons{display:flex;gap:12px;align-items:flex-end;}
.vbtn{border:none;outline:none;border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.2),rgba(255,255,255,.06));color:#fff;box-shadow:0 10px 26px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.14),0 0 0 1px rgba(255,255,255,.09);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);touch-action:none;user-select:none;-webkit-user-select:none;display:flex;align-items:center;justify-content:center;transition:transform .06s ease,filter .12s ease,box-shadow .12s ease;}
.vbtn:active,.vbtn.active{transform:translateY(2px) scale(.97);filter:brightness(1.16);box-shadow:0 5px 16px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.18),0 0 0 1px rgba(255,255,255,.15);}
.dpad .vbtn{width:68px;height:68px;font-size:28px;font-family:'Noto Sans KR',sans-serif;font-weight:900;}
.actButtons .vbtn{width:86px;height:86px;border-radius:50%;font-size:18px;letter-spacing:1px;font-family:'Bebas Neue',sans-serif;}
.actButtons .kick{background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.24),rgba(255,96,160,.28) 45%,rgba(100,0,45,.72));}
.actButtons .punch{background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.24),rgba(86,176,255,.3) 45%,rgba(10,35,110,.76));}
.ctrlHint{position:fixed;left:12px;right:12px;bottom:calc(var(--control-pad) - 8px + env(safe-area-inset-bottom,0px));display:flex;justify-content:center;pointer-events:none;z-index:129;}
.ctrlHint span{padding:5px 12px;border-radius:999px;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.08);font-family:'Noto Sans KR',sans-serif;font-size:11px;letter-spacing:.5px;color:#c2c6d6;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);} 
#fsBtn{position:fixed;top:calc(10px + env(safe-area-inset-top,0px));right:12px;z-index:150;padding:10px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(8,10,18,.58);color:#f3f4ff;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 10px 24px rgba(0,0,0,.22);}
#fsBtn:active{transform:scale(.97);}
@media (hover:hover) and (pointer:fine){
  body{padding:8px;}
  #mobileControls,.ctrlHint,#fsBtn{display:none!important;}
}
@media (hover:none) and (pointer:coarse){
  #fsBtn{display:block;}
}
@media (max-width:900px){
  :root{--control-pad:164px;}
  .lb-title{font-size:68px;}
  .lb-chars{gap:10px;flex-wrap:wrap;justify-content:center;}
  .keyguide{bottom:12px;gap:12px;flex-wrap:wrap;justify-content:center;padding:0 16px;}
}
@media (max-width:640px){
  :root{--control-pad:154px;}
  #hud{height:50px;padding:8px 10px;}
  .hname{font-size:11px;letter-spacing:2px;}
  .hnum{font-size:10px;min-width:20px;}
  .tnum{font-size:28px;}
  .tlbl{font-size:8px;}
  .htrack{height:6px;}
  .dpad{grid-template-columns:60px 60px;grid-template-rows:52px 60px;gap:8px;}
  .dpad .up{width:64px;}
  .dpad .vbtn{width:60px;height:60px;font-size:24px;}
  .actButtons{gap:10px;}
  .actButtons .vbtn{width:76px;height:76px;font-size:16px;}
  .ctrlHint span{font-size:10px;}
}
@media (max-height:720px){
  :root{--control-pad:148px;}
}
@media (max-height:620px){
  :root{--control-pad:138px;}
  .ctrlHint{display:none;}
  .actButtons .vbtn{width:72px;height:72px;}
  .dpad .vbtn{width:56px;height:56px;font-size:22px;}
  .dpad .up{width:60px;}
}

</style>
</head>
<body>
<div id="appWrap">
<button id="fsBtn" type="button" aria-label="전체화면">FULLSCREEN</button>
<div id="screen">
  <div class="scanline"></div>
  <div class="vignette"></div>
  <div id="lobby">
    <div class="lb-bg"></div><div class="lb-grid"></div>
    <div class="lb-inner">
      <div class="lb-eye">1 VS 1 ONLINE BATTLE</div>
      <div class="lb-title"><span class="a">KING OF</span><br><span class="b">HYENA</span></div>
      <div class="lb-line"></div>
      <div class="lb-chars">
        <div class="lb-char">KAZE</div>
        <div class="lb-char vs">VS</div>
        <div class="lb-char">RION</div>
      </div>
      <button class="mbtn" id="matchBtn" onclick="findMatch()"><span>MATCH START</span></button>
      <div id="statusMsg"></div>
    </div>
    <div class="keyguide">
      <span><kbd>← →</kbd>이동</span><span><kbd>↑</kbd>점프</span>
      <span><kbd>Q</kbd>주먹</span><span><kbd>A</kbd>발차기</span>
    </div>
  </div>
  <div id="gameArea" style="position:absolute;inset:0;display:none;">
    <canvas id="canvas" width="800" height="480"></canvas>
    <div id="hud">
      <div class="hcol" id="hc0">
        <div class="hlabel"><span class="hname">KAZE</span><span class="hnum" id="hn0">100</span></div>
        <div class="htrack"><div class="hbar" id="hb0" style="width:100%"></div></div>
      </div>
      <div class="tcol"><span class="tlbl">TIME</span><div class="tnum" id="tnum">60</div></div>
      <div class="hcol r" id="hc1">
        <div class="hlabel"><span class="hname">RION</span><span class="hnum" id="hn1">100</span></div>
        <div class="htrack"><div class="hbar" id="hb1" style="width:100%"></div></div>
      </div>
    </div>
    <div id="countdown"></div>
    <div id="overlay">
      <div class="ovr" id="ovr"></div>
      <div class="ovs" id="ovs"></div>
      <div class="ovline"></div>
      <button class="rbtn" onclick="location.reload()"><span>REMATCH</span></button>
    </div>
  </div>
</div>
<div class="ctrlHint"><span>모바일 조작: 방향키 / 점프 / PUNCH / KICK</span></div>
<div id="mobileControls" aria-label="mobile controls">
  <div class="ctrlCluster dpad" role="group" aria-label="movement controls">
    <button class="vbtn up" data-input="jump" aria-label="jump">▲</button>
    <button class="vbtn left" data-input="left" aria-label="move left">◀</button>
    <button class="vbtn right" data-input="right" aria-label="move right">▶</button>
  </div>
  <div class="ctrlCluster actButtons" role="group" aria-label="action controls">
    <button class="vbtn kick" data-input="kick" aria-label="kick">KICK</button>
    <button class="vbtn punch" data-input="punch" aria-label="punch">PUNCH</button>
  </div>
</div>
</div>

<script>
const socket = io();

let playerIndex = -1;
let roomId = null;
let gameState = null;
let gameOverShown = false;
let gameStarted = false;
let renderLoopStarted = false;
let inputLoopId = null;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const W = canvas.width;
const H = canvas.height;
const GY = 338;
const TAU = Math.PI * 2;

const keys = {};
const virtualKeys = { left: false, right: false, jump: false, punch: false, kick: false };
const trackedKeys = new Set(['ArrowLeft', 'ArrowRight', 'ArrowUp', 'q', 'Q', 'a', 'A', ' ']);
const tapPulseTimers = new Map();
const TAP_PULSE_MS = { jump: 120, punch: 120, kick: 120, left: 70, right: 70 };

document.addEventListener('keydown', e => {
  if (trackedKeys.has(e.key)) e.preventDefault();
  keys[e.key] = true;
  if (trackedKeys.has(e.key)) sendInputSnapshot();
});
document.addEventListener('keyup', e => {
  if (trackedKeys.has(e.key)) e.preventDefault();
  keys[e.key] = false;
  if (trackedKeys.has(e.key)) sendInputSnapshot();
});

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    Object.keys(keys).forEach(k => keys[k] = false);
    Object.keys(virtualKeys).forEach(name => setVirtualInput(name, false));
  }
});

function getInput() {
  return {
    left: !!keys['ArrowLeft'] || virtualKeys.left,
    right: !!keys['ArrowRight'] || virtualKeys.right,
    jump: !!keys['ArrowUp'] || virtualKeys.jump,
    punch: !!(keys['q'] || keys['Q']) || virtualKeys.punch,
    kick: !!(keys['a'] || keys['A']) || virtualKeys.kick
  };
}

function sendInputSnapshot() {
  if (roomId && gameStarted) socket.emit('playerInput', { roomId, input: getInput() });
}

function clearPulseTimer(name) {
  const timer = tapPulseTimers.get(name);
  if (timer) {
    clearTimeout(timer);
    tapPulseTimers.delete(name);
  }
}

function pulseVirtualInput(name, duration = TAP_PULSE_MS[name] || 90) {
  clearPulseTimer(name);
  setVirtualInput(name, true);
  sendInputSnapshot();
  const timer = setTimeout(() => {
    setVirtualInput(name, false);
    sendInputSnapshot();
    tapPulseTimers.delete(name);
  }, duration);
  tapPulseTimers.set(name, timer);
}

const virtualPointerMap = new Map();

function setVirtualInput(name, pressed, pointerId = null) {
  if (!(name in virtualKeys)) return;
  virtualKeys[name] = pressed;
  const btn = document.querySelector(`[data-input="${name}"]`);
  if (btn) btn.classList.toggle('active', pressed);
  if (pressed) clearPulseTimer(name);
  if (!pressed && pointerId !== null) virtualPointerMap.delete(pointerId);
}

function pressVirtualInput(name, pointerId = null) {
  setVirtualInput(name, true, pointerId);
  sendInputSnapshot();
}

function releaseVirtualInput(name, pointerId = null) {
  setVirtualInput(name, false, pointerId);
  sendInputSnapshot();
}

function isActionInput(name) {
  return name === 'jump' || name === 'punch' || name === 'kick';
}

function bindVirtualControls() {
  const supportsPointer = 'PointerEvent' in window;

  document.querySelectorAll('[data-input]').forEach(btn => {
    const name = btn.dataset.input;

    const onPress = e => {
      if (e) e.preventDefault();
      requestGameFullscreen();
      if (isActionInput(name)) {
        if (supportsPointer && e && btn.setPointerCapture && e.pointerId != null) btn.setPointerCapture(e.pointerId);
        if (supportsPointer && e && e.pointerId != null) virtualPointerMap.set(e.pointerId, name);
        pulseVirtualInput(name);
        return;
      }
      if (supportsPointer && e && btn.setPointerCapture && e.pointerId != null) btn.setPointerCapture(e.pointerId);
      if (supportsPointer && e && e.pointerId != null) virtualPointerMap.set(e.pointerId, name);
      pressVirtualInput(name, supportsPointer ? (e?.pointerId ?? null) : null);
    };

    const onRelease = e => {
      if (e) e.preventDefault();
      if (isActionInput(name)) return;
      const mapped = supportsPointer && e && e.pointerId != null ? (virtualPointerMap.get(e.pointerId) || name) : name;
      releaseVirtualInput(mapped, supportsPointer ? (e?.pointerId ?? null) : null);
    };

    if (supportsPointer) {
      btn.addEventListener('pointerdown', onPress, { passive: false });
      btn.addEventListener('pointerup', onRelease, { passive: false });
      btn.addEventListener('pointercancel', onRelease, { passive: false });
      btn.addEventListener('lostpointercapture', onRelease, { passive: false });
    } else {
      btn.addEventListener('touchstart', onPress, { passive: false });
      btn.addEventListener('touchend', onRelease, { passive: false });
      btn.addEventListener('touchcancel', onRelease, { passive: false });
      btn.addEventListener('click', e => {
        e.preventDefault();
        requestGameFullscreen();
        if (isActionInput(name)) pulseVirtualInput(name, TAP_PULSE_MS[name] || 120);
        else pulseVirtualInput(name, TAP_PULSE_MS[name] || 70);
      });
    }

    btn.addEventListener('contextmenu', e => e.preventDefault());
  });

  window.addEventListener('blur', () => {
    Object.keys(virtualKeys).forEach(name => {
      clearPulseTimer(name);
      setVirtualInput(name, false);
    });
  });
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function lerp(a, b, t) { return a + (b - a) * t; }
function easeOutQuad(t) { return 1 - (1 - t) * (1 - t); }

const palettes = [
  {
    skin: '#e4be7d', skin2: '#c89458',
    hair: '#111419', eye: '#6ec3ff',
    main: '#2464ff', mainDark: '#10359b', mainLight: '#6ca4ff',
    trim: '#f2f6ff', glove: '#dfe9ff',
    boots: '#0f1d3d', belt: '#f5f7ff',
    aura: 'rgba(69,174,255,.9)', aura2: 'rgba(138,224,255,.35)'
  },
  {
    skin: '#deb67b', skin2: '#be8652',
    hair: '#180e12', eye: '#ff84a4',
    main: '#d3245d', mainDark: '#821135', mainLight: '#ff6996',
    trim: '#1a0d14', glove: '#ffd6e4',
    boots: '#34101a', belt: '#12070a',
    aura: 'rgba(255,75,158,.92)', aura2: 'rgba(255,157,214,.35)'
  }
];

function createComboTracker() {
  return {
    attackActive: false,
    lastAttackStart: 0,
    chain: 0,
    variant: 0,
    flash: 0,
    label: ''
  };
}

const comboMoveNames = {
  punch: ['JAB', 'STRAIGHT', 'UPPERCUT'],
  kick: ['LOW KICK', 'MIDDLE KICK', 'ROUNDHOUSE']
};

const renderFx = {
  fighters: [null, null],
  localJump: { height: 0, velocity: 0, held: false },
  cameraShake: 0,
  impactFlash: 0,
  roleRevealEnd: 0,
  roleRevealText: '',
  combos: [createComboTracker(), createComboTracker()]
};

const isCoarsePointerDevice = window.matchMedia('(pointer: coarse)').matches || window.matchMedia('(hover: none)').matches || navigator.maxTouchPoints > 0;
const fsBtn = document.getElementById('fsBtn');
if (fsBtn) {
  fsBtn.hidden = !isCoarsePointerDevice;
  fsBtn.addEventListener('click', () => requestGameFullscreen(true));
}

async function requestGameFullscreen(force = false) {
  if (!isCoarsePointerDevice && !force) return false;
  const doc = document;
  const root = document.documentElement;
  if (doc.fullscreenElement || doc.webkitFullscreenElement) return true;
  try {
    if (root.requestFullscreen) await root.requestFullscreen({ navigationUI: 'hide' });
    else if (root.webkitRequestFullscreen) root.webkitRequestFullscreen();
    if (screen.orientation && screen.orientation.lock) {
      try { await screen.orientation.lock('landscape'); } catch (e) {}
    }
    return true;
  } catch (e) {
    return false;
  }
}

['pointerdown','touchstart'].forEach(type => {

});

window.addEventListener('orientationchange', () => {

});

bindVirtualControls();

function makeRenderFighter(serverFighter, i) {
  const x = typeof serverFighter?.x === 'number' ? serverFighter.x : (i === 0 ? 250 : 550);
  const y = typeof serverFighter?.y === 'number' ? serverFighter.y : GY;
  return {
    x, y, hp: clamp(serverFighter?.hp ?? 100, 0, 100),
    facing: serverFighter?.facing ?? (i === 0 ? 1 : -1),
    state: serverFighter?.state ?? 'idle',
    attackTimer: serverFighter?.attackTimer ?? 0,
    attackType: serverFighter?.attackType ?? null,
    hitTimer: serverFighter?.hitTimer ?? 0,
    comboVariant: 0,
    comboChain: 0,
    comboFlash: 0,
    comboLabel: ''
  };
}

function predictedPlayerY(i, serverY) {
  if (i !== playerIndex) return serverY;
  const serverHeight = Math.max(0, GY - serverY);
  return GY - Math.max(serverHeight, renderFx.localJump.height);
}

function resolveState(serverFighter, displayY) {
  if (!serverFighter) return 'idle';
  if ((serverFighter.hitTimer ?? 0) > 0) return 'hit';
  if ((serverFighter.attackTimer ?? 0) > 0) {
    if (serverFighter.attackType === 'kick') return 'kick';
    return 'punch';
  }
  if (displayY < GY - 3 || serverFighter.state === 'jump') return 'jump';
  if (serverFighter.state === 'walk') return 'walk';
  return 'idle';
}

function refreshComboState(serverFighter, i) {
  if (!renderFx.combos[i]) renderFx.combos[i] = createComboTracker();
  const tracker = renderFx.combos[i];
  const now = performance.now();
  const active = (serverFighter?.attackTimer ?? 0) > 0;
  const attackType = serverFighter?.attackType === 'kick' ? 'kick' : 'punch';

  if (active && !tracker.attackActive) {
    tracker.chain = (now - tracker.lastAttackStart <= 700) ? Math.min(tracker.chain + 1, 3) : 1;
    tracker.variant = (tracker.chain - 1) % 3;
    tracker.label = tracker.chain > 1
      ? `${comboMoveNames[attackType][tracker.variant]} · COMBO x${tracker.chain}`
      : comboMoveNames[attackType][tracker.variant];
    tracker.flash = 1;
    tracker.lastAttackStart = now;
  } else {
    if (!active && now - tracker.lastAttackStart > 850) {
      tracker.chain = 0;
    }
    tracker.flash *= active ? 0.95 : 0.88;
  }

  tracker.attackActive = active;
  if (tracker.flash < 0.03) tracker.flash = 0;
}

function updateLocalJumpPredictor() {
  const jump = renderFx.localJump;
  const wantsJump = !!keys['ArrowUp'] || virtualKeys.jump;
  const serverPlayer = gameState?.players?.[playerIndex];
  const serverY = typeof serverPlayer?.y === 'number' ? serverPlayer.y : GY;
  const serverHeight = Math.max(0, GY - serverY);
  const grounded = serverHeight < 1.5 && jump.height < 1.5;

  if (gameStarted && playerIndex !== -1 && wantsJump && !jump.held && grounded) {
    jump.height = Math.max(jump.height, 0.1);
    jump.velocity = 14;
  }

  if (jump.height > 0 || jump.velocity > 0 || serverHeight > 0) {
    jump.height = Math.max(jump.height, serverHeight);
    jump.height += jump.velocity;
    jump.velocity -= 0.82;
    if (serverHeight > jump.height) {
      jump.height = serverHeight;
      jump.velocity = Math.max(0, jump.velocity);
    }
    if (jump.height <= 0) {
      jump.height = 0;
      jump.velocity = 0;
    }
  }

  jump.held = wantsJump;
}

function stepVisualState() {
  if (!gameState?.players) return;

  updateLocalJumpPredictor();

  gameState.players.forEach((serverFighter, i) => {
    if (!renderFx.fighters[i]) {
      renderFx.fighters[i] = makeRenderFighter(serverFighter, i);
    }

    refreshComboState(serverFighter, i);

    const rf = renderFx.fighters[i];
    const serverX = typeof serverFighter.x === 'number' ? serverFighter.x : rf.x;
    const serverY = typeof serverFighter.y === 'number' ? serverFighter.y : GY;
    const targetY = predictedPlayerY(i, serverY);

    rf.x = lerp(rf.x, serverX, 0.26);
    rf.y = lerp(rf.y, targetY, 0.32);
    rf.hp = lerp(rf.hp, clamp(serverFighter.hp ?? rf.hp, 0, 100), 0.28);
    rf.facing = serverFighter.facing ?? rf.facing;
    rf.state = resolveState(serverFighter, rf.y);
    rf.attackTimer = serverFighter.attackTimer ?? 0;
    rf.attackType = serverFighter.attackType ?? null;
    rf.hitTimer = serverFighter.hitTimer ?? 0;
    rf.comboVariant = renderFx.combos[i]?.variant ?? 0;
    rf.comboChain = renderFx.combos[i]?.chain ?? 0;
    rf.comboFlash = renderFx.combos[i]?.flash ?? 0;
    rf.comboLabel = renderFx.combos[i]?.label ?? '';

    if ((serverFighter.hitTimer ?? 0) > 8) {
      renderFx.cameraShake = Math.max(renderFx.cameraShake, 8);
      renderFx.impactFlash = 0.8;
    } else if ((serverFighter.attackTimer ?? 0) > 0) {
      renderFx.cameraShake = Math.max(renderFx.cameraShake, 1.8);
    }
  });

  renderFx.cameraShake *= 0.86;
  renderFx.impactFlash *= 0.82;
}

function buildRenderState() {
  if (!gameState?.players) return null;
  return {
    ...gameState,
    players: gameState.players.map((p, i) => {
      const rf = renderFx.fighters[i] || makeRenderFighter(p, i);
      return {
        ...p,
        x: rf.x,
        y: rf.y,
        hp: rf.hp,
        facing: rf.facing,
        state: rf.state,
        attackTimer: rf.attackTimer,
        attackType: rf.attackType,
        hitTimer: rf.hitTimer
      };
    })
  };
}

function findMatch() {

  document.getElementById('matchBtn').disabled = true;

  s.textContent = '상대방을 찾는 중...';

}

socket.on('waiting', () => {

  s.textContent = '대기 중... 상대방을 기다리는 중 ⏳';

});

socket.on('matchFound', ({ roomId: rid, playerIndex: idx }) => {
  roomId = rid;
  playerIndex = idx;
  renderFx.roleRevealText = idx === 0 ? 'YOU · LEFT SIDE' : 'YOU · RIGHT SIDE';
  renderFx.roleRevealEnd = performance.now() + 5200;
  renderFx.combos = [createComboTracker(), createComboTracker()];
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('gameArea').style.display = 'block';

socket.on('gameState', state => {
  gameState = state;
  if (gameStarted) {
    updateHUD(state);
    if (state.gameOver && !gameOverShown) {

      setTimeout(() => showOverlay(state), 700);
    }
  }
});

socket.on('opponentLeft', () => {
  document.getElementById('ovr').className = 'ovr draw';
  document.getElementById('ovr').textContent = 'DISCONNECTED';
  document.getElementById('ovs').textContent = '상대방이 접속을 끊었습니다';

});

function startCountdown() {
  const el = document.getElementById('countdown');
  el.style.display = 'flex';
  const steps = ['3', '2', '1', 'FIGHT!'];
  let i = 0;

  function next() {
    el.innerHTML = '';
    if (i >= steps.length) {
      el.style.display = 'none';
      gameStarted = true;
      renderFx.roleRevealEnd = Math.max(renderFx.roleRevealEnd, performance.now() + 2800);
      startInputLoop();
      return;
    }
    const isFight = steps[i] === 'FIGHT!';
    const d = document.createElement('div');
    d.className = isFight ? 'cdf' : 'cdn';
    d.textContent = steps[i];
    el.appendChild(d);
    i++;
    setTimeout(next, isFight ? 950 : 850);
  }
  next();
}

function startInputLoop() {
  if (inputLoopId) return;
  inputLoopId = setInterval(() => {
    if (roomId && gameStarted) {
      socket.emit('playerInput', { roomId, input: getInput() });
    }
  }, 1000 / 60);
}

function startRenderLoop() {
  if (renderLoopStarted) return;
  renderLoopStarted = true;

  function frame() {
    stepVisualState();
    const renderState = buildRenderState();
    if (renderState) draw(renderState);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function updateHUD(s) {
  const h0 = Math.max(0, Math.ceil(s.players[0].hp));
  const h1 = Math.max(0, Math.ceil(s.players[1].hp));
  document.getElementById('hb0').style.width = h0 + '%';
  document.getElementById('hb1').style.width = h1 + '%';
  document.getElementById('hn0').textContent = h0;
  document.getElementById('hn1').textContent = h1;
  const t = s.timer;
  const tn = document.getElementById('tnum');
  tn.textContent = t;
  tn.className = 'tnum' + (t <= 10 ? ' turgent' : '');
  document.getElementById('hc0').className = 'hcol' + (h0 < 25 ? ' hdanger' : '');
  document.getElementById('hc1').className = 'hcol r' + (h1 < 25 ? ' hdanger' : '');

function showOverlay(s) {
  const ov = document.getElementById('overlay');
  const r = document.getElementById('ovr');
  const sb = document.getElementById('ovs');
  ov.style.display = 'flex';

  if (s.winner === -1) {
    r.className = 'ovr draw';
    r.textContent = 'DRAW';
    sb.textContent = '무승부!';
  } else if (s.winner === playerIndex) {
    r.className = 'ovr win';

    sb.textContent = '승리! 상대를 쓰러뜨렸습니다';
  } else {
    r.className = 'ovr lose';
    r.textContent = 'YOU LOSE';
    sb.textContent = '패배... 다시 도전하세요';
  }
}

function draw(s) {
  ctx.clearRect(0, 0, W, H);

  const shake = renderFx.cameraShake;
  const sx = shake ? (Math.random() - 0.5) * shake : 0;
  const sy = shake ? (Math.random() - 0.5) * shake * 0.6 : 0;

  ctx.save();
  ctx.translate(sx, sy);

  drawBG(s);

  const order = s.players[0].x < s.players[1].x ? [0, 1] : [1, 0];
  order.forEach(i => drawPlayer(s.players[i], i, s));

  s.players.forEach((p, i) => {
    if ((p.attackTimer ?? 0) > 0) drawAttackFX(p, i);
    if ((p.hitTimer ?? 0) > 0) drawHitFX(p, i);
    if (p.state === 'jump') drawAirTrail(p, i);
    if ((p.comboFlash ?? 0) > 0.04) drawComboLabel(p, i);
  });

  if (playerIndex !== -1 && s.players[playerIndex] && performance.now() < renderFx.roleRevealEnd) {
    drawRoleMarker(s.players[playerIndex]);
  }

  if (renderFx.impactFlash > 0.02) {
    ctx.fillStyle = `rgba(255,255,255,${renderFx.impactFlash * 0.12})`;
    ctx.fillRect(0, 0, W, H);
  }

  ctx.restore();
}

function drawBG(s) {
  const sky = ctx.createLinearGradient(0, 0, 0, GY);
  sky.addColorStop(0, '#050412');
  sky.addColorStop(0.45, '#120a2b');
  sky.addColorStop(1, '#2e0b15');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, GY);

  const moonGlow = ctx.createRadialGradient(660, 85, 10, 660, 85, 170);
  moonGlow.addColorStop(0, 'rgba(255,244,200,.22)');
  moonGlow.addColorStop(1, 'rgba(255,210,160,0)');
  ctx.fillStyle = moonGlow;
  ctx.fillRect(0, 0, W, 210);

  ctx.beginPath();
  ctx.arc(660, 80, 34, 0, TAU);
  ctx.fillStyle = '#fff6dc';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(676, 75, 28, 0, TAU);
  ctx.fillStyle = '#0f081e';
  ctx.fill();

  ctx.strokeStyle = 'rgba(255,255,255,.08)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    const y = 60 + i * 22;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y + 4);
    ctx.stroke();
  }

  ctx.fillStyle = 'rgba(255,255,255,.8)';
  const stars = [[35,22],[88,62],[152,18],[218,36],[270,14],[318,49],[402,27],[448,12],[512,42],[558,24],[612,48],[732,38],[768,16],[120,88],[310,84],[530,90],[705,72]];
  stars.forEach(([x, y], i) => {
    ctx.beginPath();
    ctx.arc(x, y, i % 3 === 0 ? 1.4 : 0.85, 0, TAU);
    ctx.fill();
  });

  const haze = ctx.createLinearGradient(0, 130, 0, GY);
  haze.addColorStop(0, 'rgba(255,40,90,0)');
  haze.addColorStop(1, 'rgba(255,70,20,.08)');
  ctx.fillStyle = haze;
  ctx.fillRect(0, 110, W, GY - 110);

  ctx.fillStyle = '#0d071d';
  const mountainLayers = [
    [[0,290],[60,244],[130,270],[210,215],[280,256],[360,200],[445,248],[520,205],[600,255],[705,182],[800,230],[800,GY],[0,GY]],
    [[0,312],[82,262],[145,290],[230,248],[315,284],[405,230],[495,283],[574,248],[650,290],[740,235],[800,270],[800,GY],[0,GY]]
  ];
  mountainLayers.forEach((pts, idx) => {
    ctx.beginPath();
    pts.forEach(([x, y], i) => i ? ctx.lineTo(x, y) : ctx.moveTo(x, y));
    ctx.closePath();
    ctx.fillStyle = idx === 0 ? '#090415' : '#13081f';
    ctx.fill();
  });

  ctx.save();
  ctx.globalAlpha = 0.16;
  ctx.strokeStyle = '#ff4f2c';
  ctx.lineWidth = 18;
  ctx.beginPath();
  ctx.moveTo(330, 170);
  ctx.lineTo(470, 170);
  ctx.stroke();
  ctx.lineWidth = 10;
  ctx.beginPath();
  ctx.moveTo(340, 188);
  ctx.lineTo(460, 188);
  ctx.stroke();
  ctx.lineWidth = 14;
  ctx.beginPath();
  ctx.moveTo(350, 170);
  ctx.lineTo(350, GY - 10);
  ctx.moveTo(450, 170);
  ctx.lineTo(450, GY - 10);
  ctx.stroke();
  ctx.restore();

  ctx.fillStyle = '#130514';
  const buildings = [
    [0,72,46],[46,96,40],[90,62,52],[143,110,38],[182,72,56],[240,124,48],[292,78,54],
    [350,104,42],[393,72,50],[445,118,42],[488,82,54],[546,134,40],[588,76,50],[640,108,46],[688,70,58],[748,126,52]
  ];
  buildings.forEach(([x, h, w], idx) => {
    ctx.fillRect(x, GY - h, w, h);
    ctx.fillStyle = 'rgba(255,186,90,.10)';
    for (let wy = GY - h + 8; wy < GY - 8; wy += 11) {
      for (let wx = x + 5; wx < x + w - 5; wx += 9) {
        if (((wx + wy + idx) % 4) < 2) ctx.fillRect(wx, wy, 4, 5);
      }
    }
    ctx.fillStyle = '#130514';
  });

  const floor = ctx.createLinearGradient(0, GY, 0, H);
  floor.addColorStop(0, '#321109');
  floor.addColorStop(0.4, '#140604');
  floor.addColorStop(1, '#050202');
  ctx.fillStyle = floor;
  ctx.fillRect(0, GY, W, H - GY);

  const floorGlow = ctx.createLinearGradient(0, GY, 0, H);
  floorGlow.addColorStop(0, 'rgba(255,103,44,.2)');
  floorGlow.addColorStop(1, 'rgba(255,103,44,0)');
  ctx.fillStyle = floorGlow;
  ctx.fillRect(0, GY, W, 90);

  ctx.strokeStyle = 'rgba(255,99,58,.14)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 16; i++) {
    const x = i * 52;
    ctx.beginPath();
    ctx.moveTo(x, GY);
    ctx.lineTo(400 + (x - 400) * 2.4, H);
    ctx.stroke();
  }
  for (let i = 0; i < 8; i++) {
    const y = GY + i * 18;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y + i * 4);
    ctx.stroke();
  }

  ctx.save();
  ctx.shadowColor = '#ff5b2d';
  ctx.shadowBlur = 16;
  ctx.strokeStyle = 'rgba(255,96,42,.32)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GY);
  ctx.lineTo(W, GY);
  ctx.stroke();
  ctx.restore();

  drawStageLights(s);
}

function drawStageLights(s) {
  const centerX = (s.players[0].x + s.players[1].x) * 0.5;
  const beam = ctx.createRadialGradient(centerX, 280, 10, centerX, 280, 250);
  beam.addColorStop(0, 'rgba(255,120,70,.16)');
  beam.addColorStop(1, 'rgba(255,120,70,0)');
  ctx.fillStyle = beam;
  ctx.fillRect(centerX - 260, 40, 520, H - 40);
}

function capsule(x, y, w, h, fill, stroke, radius = Math.min(w, h) / 2) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, radius);
  ctx.fillStyle = fill;
  ctx.fill();
  if (stroke) {
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function glowStroke(color, width, fn) {
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = 14;
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  fn();
  ctx.restore();
}

function drawPlayer(p, idx, s) {
  const pal = palettes[idx];
  const t = performance.now() * 0.001;
  const facing = p.facing ?? (idx === 0 ? 1 : -1);
  const air = Math.max(0, GY - p.y);
  const walkPhase = p.state === 'walk' ? Math.sin(t * 10 + idx * 1.2) : 0;
  const idleBob = (p.state === 'idle' ? Math.sin(t * 3.6 + idx) * 2.5 : 0);
  const attackProgress = clamp(1 - ((p.attackTimer ?? 0) / 25), 0, 1);
  const strike = Math.sin(attackProgress * Math.PI);
  const hitFlash = (p.hitTimer ?? 0) > 0;
  const jumpLean = p.state === 'jump' ? -0.08 : 0;
  const scaleY = p.state === 'jump' ? 0.98 : 1;
  const comboVariant = p.comboVariant ?? 0;
  const comboPower = clamp((p.comboChain ?? 1) / 3, 0.34, 1);

  ctx.save();
  ctx.translate(p.x, p.y + idleBob);
  if (facing < 0) ctx.scale(-1, 1);
  ctx.scale(1, scaleY);

  if (air < 2) {
    const sw = lerp(42, 24, clamp(air / 90, 0, 1));
    const sg = ctx.createRadialGradient(0, 8, 0, 0, 8, sw);
    sg.addColorStop(0, 'rgba(0,0,0,.48)');
    sg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.ellipse(0, 8, sw, sw * 0.32, 0, 0, TAU);
    ctx.fill();
  } else {
    const sw = lerp(38, 20, clamp(air / 110, 0, 1));
    ctx.fillStyle = 'rgba(0,0,0,.26)';
    ctx.beginPath();
    ctx.ellipse(0, 8, sw, sw * 0.22, 0, 0, TAU);
    ctx.fill();
  }

  if (p.state === 'jump') {
    const aura = ctx.createRadialGradient(0, -70, 8, 0, -70, 70);
    aura.addColorStop(0, pal.aura2);
    aura.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.arc(0, -70, 70, 0, TAU);
    ctx.fill();
  }

  let rearLeg = p.state === 'jump' ? -0.8 : (p.state === 'walk' ? walkPhase * 0.45 : 0.15);
  let frontLeg = p.state === 'jump' ? 0.95 : (p.state === 'walk' ? -walkPhase * 0.45 : -0.14);
  let rearArm = p.state === 'jump' ? -0.85 : (p.state === 'walk' ? -walkPhase * 0.28 : -0.18);
  let frontArm = p.state === 'jump' ? 0.65 : (p.state === 'walk' ? walkPhase * 0.28 : 0.3);
  let frontKick = 0;
  let torsoLean = jumpLean;

  if (p.state === 'punch') {
    if (comboVariant === 0) {
      frontArm = -0.35 + strike * 1.65;
      torsoLean = -0.05;
    } else if (comboVariant === 1) {
      frontArm = -0.55 + strike * 1.9;
      rearArm = -0.28;
      torsoLean = -0.12;
    } else {
      frontArm = 0.82 - strike * 1.45;
      rearLeg = 0.06;
      frontLeg = -0.22;
      torsoLean = -0.2;
    }
  }
  if (p.state === 'kick') {
    if (comboVariant === 0) {
      frontArm = 0.86 - strike * 0.42;
      frontKick = -0.06 + strike * 0.92;
      torsoLean = -0.02;
    } else if (comboVariant === 1) {
      frontArm = 0.95 - strike * 0.55;
      frontKick = -0.35 + strike * 1.55;
      torsoLean = -0.06;
    } else {
      frontArm = 1.1 - strike * 0.98;
      rearArm = -0.5;
      frontKick = -0.82 + strike * 2.15;
      rearLeg = 0.3;
      torsoLean = -0.18;
    }
  }

  drawLeg(-12, -6, rearLeg, pal, p.state === 'jump', false);
  drawLeg(8, -6, frontKick || frontLeg, pal, p.state === 'jump', true);

  drawTorso(pal, torsoLean, hitFlash);

  drawArm(-23, -82, rearArm, pal, false, p.state === 'jump');
  drawArm(16, -82, frontArm, pal, true, p.state === 'jump', p.state === 'punch');

  drawHead(pal, p.state, hitFlash, idx);

  if (p.state === 'kick') {
    drawKickFlare(28, -44, strike, pal, comboVariant, comboPower);
  }
  if (p.state === 'punch') {
    drawPunchFlare(42, -70, strike, pal, comboVariant, comboPower);
  }

  if (hitFlash) {
    ctx.fillStyle = 'rgba(255,255,255,.18)';
    ctx.beginPath();
    ctx.arc(0, -70, 48, 0, TAU);
    ctx.fill();
  }

  ctx.restore();
}

function drawLeg(x, y, angle, pal, jumping, frontSide) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  capsule(-8, -34, 16, 38, pal.mainDark, '#0c0c0f', 8);
  capsule(-9, -8, 18, 42, pal.main, '#07080a', 9);
  ctx.fillStyle = 'rgba(255,255,255,.12)';
  ctx.fillRect(-7, -6, 4, 32);

  ctx.translate(0, 30);
  ctx.rotate(jumping ? 0.5 : (frontSide ? -0.22 : 0.12));
  capsule(-10, -2, 20, 22, pal.boots, '#050508', 8);
  ctx.fillStyle = 'rgba(255,255,255,.08)';
  ctx.fillRect(-7, 1, 4, 13);
  ctx.fillStyle = '#11131a';
  ctx.beginPath();
  ctx.ellipse(7, 16, 14, 6, -0.08, 0, TAU);
  ctx.fill();
  ctx.restore();
}

function drawTorso(pal, lean, hitFlash) {
  ctx.save();
  ctx.translate(0, -54);
  ctx.rotate(lean);

  ctx.beginPath();
  ctx.moveTo(-24, -44);
  ctx.lineTo(22, -44);
  ctx.lineTo(28, 14);
  ctx.lineTo(-28, 14);
  ctx.closePath();
  ctx.fillStyle = pal.mainDark;
  ctx.fill();
  ctx.strokeStyle = '#07080a';
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(-22, -42);
  ctx.lineTo(0, -26);
  ctx.lineTo(0, 14);
  ctx.lineTo(-29, 14);
  ctx.closePath();
  ctx.fillStyle = pal.main;
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(22, -42);
  ctx.lineTo(0, -26);
  ctx.lineTo(0, 14);
  ctx.lineTo(29, 14);
  ctx.closePath();
  ctx.fillStyle = pal.main;
  ctx.fill();

  ctx.strokeStyle = pal.mainLight;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-13, -37);
  ctx.lineTo(0, -27);
  ctx.lineTo(13, -37);
  ctx.stroke();

  capsule(-28, 10, 56, 9, pal.belt, '#0a0a0d', 4);
  ctx.fillStyle = pal.trim;
  ctx.beginPath();
  ctx.ellipse(0, 14, 7, 5, 0, 0, TAU);
  ctx.fill();
  ctx.strokeStyle = '#0b0c0f';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = pal.trim;
  ctx.fillRect(-4, 18, 4, 18);
  ctx.fillRect(2, 18, 4, 16);

  ctx.fillStyle = pal.skin;
  capsule(-6, -52, 12, 12, pal.skin, '#35210e', 3);

  if (hitFlash) {
    ctx.strokeStyle = 'rgba(255,255,255,.6)';
    ctx.lineWidth = 2;
    ctx.strokeRect(-24, -38, 48, 44);
  }
  ctx.restore();
}

function drawArm(x, y, angle, pal, front, jumping, punching = false) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  capsule(-8, -4, 16, 28, pal.mainDark, '#08090c', 8);
  ctx.translate(0, 22);
  ctx.rotate(punching ? 0.1 : (jumping ? 0.35 : -0.05));
  capsule(-7, -3, 14, 32, pal.main, '#07080a', 7);
  ctx.fillStyle = 'rgba(255,255,255,.12)';
  ctx.fillRect(-5, -1, 3, 24);

  ctx.translate(front ? 2 : -2, 28);
  ctx.rotate(front ? 0.08 : -0.06);
  capsule(-9, -3, 18, 16, pal.glove, '#07080a', 7);
  ctx.fillStyle = pal.skin;
  capsule(-6, 8, 12, 9, pal.skin, '#35210e', 4);
  ctx.restore();
}

function drawHead(pal, state, hitFlash, idx) {
  ctx.save();
  ctx.translate(0, -118);

  ctx.beginPath();
  ctx.ellipse(0, 0, 20, 24, 0, 0, TAU);
  ctx.fillStyle = pal.skin;
  ctx.fill();
  ctx.strokeStyle = '#35210e';
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.fillStyle = pal.skin2;
  ctx.beginPath();
  ctx.ellipse(-18, 1, 5, 6, -0.1, 0, TAU);
  ctx.fill();

  ctx.fillStyle = pal.hair;
  if (idx === 0) {
    ctx.beginPath();
    ctx.moveTo(-20, -2);
    ctx.lineTo(-14, -23);
    ctx.lineTo(-6, -12);
    ctx.lineTo(0, -29);
    ctx.lineTo(7, -14);
    ctx.lineTo(15, -25);
    ctx.lineTo(20, -4);
    ctx.closePath();
    ctx.fill();
    ctx.fillRect(-20, -8, 40, 8);
  } else {
    ctx.beginPath();
    ctx.moveTo(-20, -2);
    ctx.lineTo(-18, -23);
    ctx.lineTo(0, -28);
    ctx.lineTo(18, -20);
    ctx.lineTo(20, 6);
    ctx.lineTo(16, 16);
    ctx.lineTo(12, 34);
    ctx.lineTo(-12, 34);
    ctx.lineTo(-17, 20);
    ctx.lineTo(-20, 6);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = pal.mainLight;
    ctx.fillRect(-18, -8, 36, 6);
  }

  ctx.strokeStyle = '#1b1214';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(2, -6);
  ctx.lineTo(15, -4);
  ctx.stroke();

  ctx.fillStyle = '#f7f7f3';
  ctx.beginPath();
  ctx.ellipse(10, 3, 5.8, 4.2, 0, 0, TAU);
  ctx.fill();

  ctx.fillStyle = hitFlash ? '#ff3a2b' : pal.eye;
  ctx.beginPath();
  ctx.ellipse(11, 3, 3.3, 3.6, 0, 0, TAU);
  ctx.fill();

  ctx.fillStyle = '#050505';
  ctx.beginPath();
  ctx.arc(12, 3, 1.6, 0, TAU);
  ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,.85)';
  ctx.beginPath();
  ctx.arc(12.8, 1.6, 0.85, 0, TAU);
  ctx.fill();

  ctx.strokeStyle = pal.skin2;
  ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.moveTo(2, 4);
  ctx.quadraticCurveTo(5, 8, 2, 12);
  ctx.stroke();

  ctx.strokeStyle = state === 'hit' ? '#ff3d29' : '#7b4a34';
  ctx.lineWidth = 2;
  ctx.beginPath();
  if (state === 'punch' || state === 'kick') {
    ctx.moveTo(-2, 18);
    ctx.lineTo(10, 18);
  } else if (state === 'hit') {
    ctx.arc(4, 18, 6, 0.2, Math.PI - 0.2, true);
  } else {
    ctx.arc(4, 17, 5, 0, Math.PI);
  }
  ctx.stroke();

  ctx.restore();
}

function drawPunchFlare(x, y, strike, pal, variant = 0, power = 0.4) {
  if (strike <= 0.04) return;
  const radius = 22 + power * 14 + variant * 3;
  ctx.save();
  ctx.translate(x + strike * (24 + variant * 4), y - strike * (6 + variant * 4));
  ctx.globalAlpha = strike * (0.82 + power * 0.35);
  const g = ctx.createRadialGradient(0, 0, 0, 0, 0, radius);
  g.addColorStop(0, 'rgba(255,255,255,.95)');
  g.addColorStop(0.35, pal.aura);
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(0, 0, radius, 0, TAU);
  ctx.fill();

  glowStroke(pal.aura, 2.2 + power, () => {
    ctx.beginPath();
    const lines = 4 + variant;
    for (let i = 0; i < lines; i++) {
      ctx.moveTo(-18 + i * 6, -8 + i * 2);
      ctx.lineTo(14 + i * 8, -15 + i * 5);
    }
    ctx.stroke();
  });
  ctx.restore();
}

function drawKickFlare(x, y, strike, pal, variant = 0, power = 0.4) {
  if (strike <= 0.04) return;
  const arcRadius = 34 + strike * 8 + variant * 8 + power * 10;
  ctx.save();
  ctx.translate(x + strike * (24 + variant * 5), y - strike * (8 + variant * 2));
  ctx.globalAlpha = strike * (0.78 + power * 0.3);
  glowStroke(pal.aura, 3 + power, () => {
    ctx.beginPath();
    ctx.arc(0, 0, arcRadius, -1.2 - variant * 0.16, 0.36 + variant * 0.1);
    ctx.stroke();
  });
  const spark = ctx.createRadialGradient(0, 0, 0, 0, 0, 18 + power * 8);
  spark.addColorStop(0, 'rgba(255,255,255,.9)');
  spark.addColorStop(0.45, pal.aura);
  spark.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = spark;
  ctx.beginPath();
  ctx.arc(0, 0, 18 + power * 8, 0, TAU);
  ctx.fill();
  ctx.restore();
}

function drawAttackFX(p, idx) {
  const pal = palettes[idx];
  const facing = p.facing ?? 1;
  const progress = clamp(1 - ((p.attackTimer ?? 0) / 25), 0, 1);
  const strike = Math.sin(progress * Math.PI);
  const px = p.x;
  const py = p.y;
  const variant = p.comboVariant ?? 0;
  const comboPower = clamp((p.comboChain ?? 1) / 3, 0.34, 1);

  ctx.save();
  if (p.attackType === 'kick') {
    const cx = px + facing * (58 + variant * 8);
    const cy = py - (60 + variant * 5);
    ctx.globalAlpha = 0.35 + strike * (0.45 + comboPower * 0.25);
    const rings = 4 + variant;
    for (let i = 0; i < rings; i++) {
      ctx.beginPath();
      const radius = 34 + i * 10 + variant * 4;
      const start = facing > 0 ? -1.2 - variant * 0.12 : Math.PI + 0.12 - variant * 0.08;
      const end = facing > 0 ? 0.3 + variant * 0.14 : Math.PI + 1.44 + variant * 0.14;
      ctx.arc(cx - facing * 14, cy, radius, start, end);
      ctx.strokeStyle = i % 2 === 0 ? pal.aura : pal.aura2;
      ctx.lineWidth = 3.6 - i * 0.45 + comboPower * 0.3;
      ctx.stroke();
    }
  } else {
    const cx = px + facing * (76 + variant * 10);
    const cy = py - (74 + variant * 3);
    ctx.globalAlpha = 0.38 + strike * (0.45 + comboPower * 0.24);
    const trails = 5 + variant;
    for (let i = 0; i < trails; i++) {
      ctx.beginPath();
      const len = 22 + i * 10 + comboPower * 8;
      ctx.moveTo(cx - facing * (8 + i * 8), cy + i * 2 - variant * 2);
      ctx.lineTo(cx + facing * len, cy - i * (3 + variant));
      ctx.strokeStyle = i % 2 === 0 ? pal.aura : pal.aura2;
      ctx.lineWidth = 4 - i * 0.45 + comboPower * 0.3;
      ctx.stroke();
    }

    const ring = ctx.createRadialGradient(cx, cy, 0, cx, cy, 28 + comboPower * 10);
    ring.addColorStop(0, 'rgba(255,255,255,.95)');
    ring.addColorStop(0.45, pal.aura);
    ring.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = ring;
    ctx.beginPath();
    ctx.arc(cx, cy, 28 + comboPower * 10, 0, TAU);
    ctx.fill();
  }
  ctx.restore();
}

function drawRoleMarker(p) {
  const remain = clamp((renderFx.roleRevealEnd - performance.now()) / 2800, 0, 1);
  if (remain <= 0) return;

  const x = p.x;
  const y = p.y - 170;
  const w = 152;
  const h = 34;

  ctx.save();
  ctx.globalAlpha = Math.min(1, remain * 1.1);
  const floatY = Math.sin(performance.now() * 0.01) * 4;
  ctx.translate(0, floatY);

  const g = ctx.createLinearGradient(x - w / 2, y, x + w / 2, y + h);
  g.addColorStop(0, 'rgba(32,120,255,.92)');
  g.addColorStop(1, 'rgba(255,72,32,.92)');
  capsule(x - w / 2, y, w, h, g, 'rgba(255,255,255,.8)', 18);
  ctx.fillStyle = '#ffffff';
  ctx.font = '900 16px "Bebas Neue", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(renderFx.roleRevealText || 'YOU', x, y + 18);

  ctx.beginPath();
  ctx.moveTo(x, y + h + 14);
  ctx.lineTo(x - 11, y + h - 2);
  ctx.lineTo(x + 11, y + h - 2);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,.92)';
  ctx.fill();

  ctx.restore();
}

function drawComboLabel(p, idx) {
  const flash = clamp(p.comboFlash ?? 0, 0, 1);
  if (flash <= 0) return;
  const x = p.x;
  const y = p.y - 140;
  const pal = palettes[idx];
  const text = p.comboLabel || (p.comboChain > 1 ? `COMBO x${p.comboChain}` : 'ATTACK');
  const width = Math.max(120, Math.min(220, 22 + text.length * 9));

  ctx.save();
  ctx.globalAlpha = flash;
  ctx.translate(0, -12 * (1 - flash));
  const fill = ctx.createLinearGradient(x - width / 2, y, x + width / 2, y + 28);
  fill.addColorStop(0, 'rgba(10,10,16,.9)');
  fill.addColorStop(1, 'rgba(35,35,48,.88)');
  capsule(x - width / 2, y, width, 28, fill, pal.aura, 14);
  ctx.fillStyle = '#fff7da';
  ctx.font = '900 15px "Bebas Neue", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y + 15);
  ctx.restore();
}

function drawHitFX(p, idx) {
  const pal = palettes[idx];
  const x = p.x + (p.facing ?? 1) * 10;
  const y = p.y - 86;
  const progress = clamp((p.hitTimer ?? 0) / 15, 0, 1);

  ctx.save();
  ctx.globalAlpha = progress;

  const burst = ctx.createRadialGradient(x, y, 0, x, y, 36);
  burst.addColorStop(0, 'rgba(255,255,255,.96)');
  burst.addColorStop(0.35, '#ffd54c');
  burst.addColorStop(0.7, pal.aura);
  burst.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = burst;
  ctx.beginPath();
  ctx.arc(x, y, 36, 0, TAU);
  ctx.fill();

  ctx.strokeStyle = '#fff9b1';
  ctx.lineWidth = 2.5;
  for (let i = 0; i < 10; i++) {
    const ang = (i / 10) * TAU;
    const r = 18 + i * 1.6;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + Math.cos(ang) * r, y + Math.sin(ang) * r);
    ctx.stroke();
  }

  ctx.fillStyle = '#ffd249';
  for (let i = 0; i < 7; i++) {
    const ang = (i / 7) * TAU + performance.now() * 0.01;
    ctx.beginPath();
    ctx.arc(x + Math.cos(ang) * 28, y + Math.sin(ang) * 20, 2.4, 0, TAU);
    ctx.fill();
  }

  ctx.restore();
}

function drawAirTrail(p, idx) {
  const pal = palettes[idx];
  const x = p.x - (p.facing ?? 1) * 18;
  const y = p.y - 20;
  ctx.save();
  ctx.globalAlpha = 0.18;
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i === 0 ? pal.aura : pal.aura2;
    ctx.beginPath();
    ctx.ellipse(x - i * (p.facing ?? 1) * 18, y + i * 4, 20 - i * 4, 8 - i * 1.5, -0.2, 0, TAU);
    ctx.fill();
  }
  ctx.restore();
}
